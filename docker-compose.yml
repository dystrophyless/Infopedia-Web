services:
  postgres:
    image: pgvector/pgvector:pg17
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT}:80"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

  redis:
    image: redis:7.4-alpine
    env_file:
      - .env
    command:
      [
        "redis-server",
        "--save", "60", "1",
        "--loglevel", "warning",
        "--appendonly", "yes",
        "--requirepass", "${REDIS_PASSWORD}"
      ]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    hostname: rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

  prepare_app:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      HF_HOME: /home/app/.cache/huggingface
      HF_HUB_CACHE: /home/app/.cache/huggingface/hub
      TRANSFORMERS_CACHE: /home/app/.cache/huggingface/hub
    volumes:
      - hf_cache:/home/app/.cache/huggingface
    command: ["python", "-u", "-m", "src.prepare_app"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      HF_HOME: /home/app/.cache/huggingface
      HF_HUB_CACHE: /home/app/.cache/huggingface/hub
      TRANSFORMERS_CACHE: /home/app/.cache/huggingface/hub
    volumes:
      - hf_cache:/home/app/.cache/huggingface
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .venv/
            - venv/
            - __pycache__/
            - .mypy_cache/
            - .pytest_cache/
            - .idea/
            - .vscode/
            - .postgres_data/

        - action: rebuild
          path: pyproject.toml

        - action: rebuild
          path: uv.lock

        - action: rebuild
          path: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      HF_HOME: /home/app/.cache/huggingface
      HF_HUB_CACHE: /home/app/.cache/huggingface/hub
      TRANSFORMERS_CACHE: /home/app/.cache/huggingface/hub
    volumes:
      - hf_cache:/home/app/.cache/huggingface
    command: [ "celery", "-A", "src.celery_app.app", "worker", "--pool=prefork", "--concurrency=2", "--loglevel=DEBUG" ]
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .venv/
            - venv/
            - __pycache__/
            - .mypy_cache/
            - .pytest_cache/
            - .idea/
            - .vscode/
            - .postgres_data/

        - action: rebuild
          path: pyproject.toml

        - action: rebuild
          path: uv.lock

        - action: rebuild
          path: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  hf_cache:

networks:
  app_network:
    driver: bridge
